<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Máquina de Solda 3D</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:#020617;
    font-family:Arial, Helvetica, sans-serif;
}

/* =====================================
PAINEL
===================================== */

.painel{

    position:absolute;

    top:20px;
    left:20px;

    width:260px;

    background:rgba(2,6,23,0.92);

    border:1px solid rgba(255,255,255,0.08);

    border-radius:18px;

    padding:20px;

    color:white;

    z-index:100;

    backdrop-filter:blur(10px);

    box-shadow:
    0 0 30px rgba(0,0,0,0.4),
    inset 0 0 20px rgba(255,255,255,0.02);
}

.painel h2{

    text-align:center;

    margin-bottom:20px;

    color:#38bdf8;

    letter-spacing:2px;
}

label{

    display:block;

    margin-top:15px;

    margin-bottom:8px;

    font-size:14px;

    color:#cbd5e1;
}

input[type="range"]{

    width:100%;
}

button{

    width:100%;

    margin-top:15px;

    padding:13px;

    border:none;

    border-radius:12px;

    background:linear-gradient(
        145deg,
        #0ea5e9,
        #2563eb
    );

    color:white;

    font-weight:bold;

    cursor:pointer;

    transition:0.3s;

    box-shadow:
    0 0 20px rgba(59,130,246,0.3);
}

button:hover{

    transform:translateY(-2px);

    box-shadow:
    0 0 30px rgba(59,130,246,0.5);
}

.status{

    margin-top:20px;

    padding-top:15px;

    border-top:1px solid rgba(255,255,255,0.08);
}

.status p{

    margin-top:10px;

    color:#94a3b8;

    font-size:14px;
}

.status span{

    color:#4ade80;

    font-weight:bold;
}

canvas{
    display:block;
}

</style>
</head>

<body>

<!-- =====================================
PAINEL
===================================== -->

<div class="painel">

    <h2>SOLDATECH</h2>

    <label>Altura do Bico</label>

    <input
        type="range"
        id="altura"
        min="1"
        max="6"
        step="0.1"
        value="5"
    >

    <button onclick="moverBico()">
        MOVER BICO
    </button>

    <button onclick="girarMesa()">
        GIRAR MESA
    </button>
    <button onclick="salvarPonto()">
    SALVAR PONTO
</button>

<button onclick="salvarPrograma()">
    SALVAR PROGRAMA
</button>

<p id="statusPrograma"
style="
margin-top:10px;
font-size:13px;
color:#4ade80;
">
</p>

<div id="listaPontos" style="
margin-top:15px;
max-height:200px;
overflow:auto;
font-size:13px;
color:#cbd5e1;
"></div>

    <div class="status">

        <p>Status Máquina:
            <span>ONLINE</span>
        </p>

        <p>Mesa:
            <span id="statusMesa">
                PARADA
            </span>
        </p>

    </div>

</div>

<!-- =====================================
THREE JS
===================================== -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>

/* =====================================
CENA
===================================== */

const scene =
new THREE.Scene();

scene.background =
new THREE.Color(0x020617);

/* =====================================
CAMERA
===================================== */

const camera =
new THREE.PerspectiveCamera(
    70,
    window.innerWidth /
    window.innerHeight,
    0.1,
    1000
);

camera.position.set(
    18,
    14,
    18
);

camera.lookAt(
    0,
    1,
    0
);

/* =====================================
RENDER
===================================== */

const renderer =
new THREE.WebGLRenderer({

    antialias:true

});

renderer.setSize(
    window.innerWidth,
    window.innerHeight
);

renderer.shadowMap.enabled = true;

renderer.shadowMap.type =
THREE.PCFSoftShadowMap;

document.body.appendChild(
    renderer.domElement
);

/* =====================================
CONTROLES CAMERA
===================================== */

const controls =
new THREE.OrbitControls(
    camera,
    renderer.domElement
);

controls.enableDamping = true;

controls.dampingFactor = 0.05;

controls.minDistance = 5;

controls.maxDistance = 30;

/* =====================================
LUZES
===================================== */

const luzPrincipal =
new THREE.DirectionalLight(
    0xffffff,
    2
);

luzPrincipal.position.set(
    10,
    20,
    10
);

luzPrincipal.castShadow = true;

scene.add(luzPrincipal);

const ambiente =
new THREE.AmbientLight(
    0xffffff,
    1.8
);

scene.add(ambiente);

const luzAzul =
new THREE.PointLight(
    0x00bbff,
    8,
    30
);

luzAzul.position.set(
    0,
    8,
    0
);

scene.add(luzAzul);

/* =====================================
PISO
===================================== */

const piso =
new THREE.Mesh(

    new THREE.PlaneGeometry(
        100,
        100
    ),

    new THREE.MeshStandardMaterial({

        color:0x2b2f3a,

        metalness:0.3,

        roughness:0.9

    })

);

piso.rotation.x =
-Math.PI / 2;

piso.receiveShadow = true;

scene.add(piso);

/* =====================================
MATERIAIS
===================================== */

const metalEscuro =
new THREE.MeshPhysicalMaterial({

    color:0x3f3f46,

    metalness:1,

    roughness:0.3

});

const metalClaro =
new THREE.MeshPhysicalMaterial({

    color:0x888888,

    metalness:1,

    roughness:0.2

});

const metalAzul =
new THREE.MeshPhysicalMaterial({

    color:0x2563eb,

    metalness:0.9,

    roughness:0.2

});

/* =====================================
BASE
===================================== */

const base =
new THREE.Mesh(

    new THREE.BoxGeometry(
        10,
        1,
        10
    ),

    metalEscuro

);

base.position.y = 0;

base.receiveShadow = true;

base.castShadow = true;

scene.add(base);

/* =====================================
COLUNAS
===================================== */

function criarColuna(x,z){

    const coluna =
    new THREE.Mesh(

        new THREE.BoxGeometry(
            0.6,
            9,
            0.6
        ),

        metalClaro

    );

    coluna.position.set(
        x,
        4.5,
        z
    );

    coluna.castShadow = true;

    scene.add(coluna);
}

criarColuna(-4,-4);
criarColuna(4,-4);
criarColuna(-4,4);
criarColuna(4,4);

/* =====================================
TOPO
===================================== */

const topo =
new THREE.Mesh(

    new THREE.BoxGeometry(
        10,
        1,
        10
    ),

    metalEscuro

);

topo.position.y = 9;

topo.castShadow = true;

scene.add(topo);

/* =====================================
TRILHO
===================================== */

const trilho =
new THREE.Mesh(

    new THREE.BoxGeometry(
        6,
        0.5,
        1
    ),

    metalAzul

);

trilho.position.set(
    0,
    7,
    0
);

scene.add(trilho);

/* =====================================
SUPORTE
===================================== */



/* =====================================
BICO
===================================== */

const bico =
new THREE.Mesh(

    new THREE.CylinderGeometry(
        0.15,
        0.35,
        2,
        32
    ),

    new THREE.MeshPhysicalMaterial({

        color:0xff8800,

        emissive:0xff6600,

        emissiveIntensity:0.5,

        metalness:1,

        roughness:0.2

    })

);

bico.rotation.z =
Math.PI / 2;

bico.position.set(
    2,
    5,
    0
);

bico.castShadow = true;

scene.add(bico);

/* =====================================
LUZ SOLDA
===================================== */

const luzSolda =
new THREE.PointLight(
    0x00bbff,
    5,
    10
);

luzSolda.position.copy(
    bico.position
);

scene.add(luzSolda);

/* =====================================
MESA
===================================== */

const mesa =
new THREE.Mesh(

    new THREE.CylinderGeometry(
        2.5,
        2.5,
        0.8,
        64
    ),

    new THREE.MeshPhysicalMaterial({

        color:0x444444,

        metalness:1,

        roughness:0.05,

        clearcoat:1

    })

);

mesa.position.y = 0.9;

mesa.castShadow = true;

mesa.receiveShadow = true;

scene.add(mesa);

/* =====================================
PEÇA
===================================== */

const peca =
new THREE.Mesh(

    new THREE.BoxGeometry(
        1.5,
        1.5,
        1.5
    ),

    new THREE.MeshPhysicalMaterial({

        color:0xff1493,

        emissive:0xff00ff,

        emissiveIntensity:1.5,

        metalness:1,

        roughness:0.1,

        clearcoat:1

    })

);

peca.position.y = 1.2;

peca.castShadow = true;

mesa.add(peca);

/* =====================================
MOVIMENTO BICO
===================================== */
/* =====================================
PONTOS
===================================== */

let pontos = [];

function salvarPonto(){

    const ponto = {

        x: Number(
            bico.position.x.toFixed(2)
        ),

        y: Number(
            bico.position.y.toFixed(2)
        ),

        z: Number(
            bico.position.z.toFixed(2)
        )
    };

    pontos.push(ponto);

    atualizarLista();

    console.log(pontos);
}

function atualizarLista(){

    const lista =
    document.getElementById(
        "listaPontos"
    );

    lista.innerHTML = "";

    pontos.forEach((ponto,index)=>{

        lista.innerHTML += `

        <div style="
        margin-top:10px;
        padding:10px;
        border-radius:10px;
        background:rgba(255,255,255,0.05);
        ">

        P${index + 1}

        <br>

        X: ${ponto.x}

        Y: ${ponto.y}

        Z: ${ponto.z}

        </div>
        `;
    });
}
function moverBico(){

    const altura =
    Number(
        document.getElementById(
            "altura"
        ).value
    );



    bico.position.y =
    altura;

    luzSolda.position.copy(
        bico.position
    );
}

/* =====================================
GIRAR MESA
===================================== */

let girando = false;

function girarMesa(){

    girando = !girando;

    document.getElementById(
        "statusMesa"
    ).innerText =

    girando
    ? "GIRANDO"
    : "PARADA";
}

/* =====================================
ANIMAÇÃO
===================================== */

function animate(){

    requestAnimationFrame(
        animate
    );

    controls.update();

    if(girando){

        mesa.rotation.y += 0.02;
    }

    luzSolda.intensity =
    4 +
    Math.sin(Date.now()*0.01);

    renderer.render(
        scene,
        camera
    );
}
/* =====================================
SALVAR PROGRAMA
===================================== */

function salvarPrograma(){

    if(pontos.length === 0){
        alert("Nenhum ponto salvo!");
        return;
    }

    const nome = prompt("Digite o nome do programa:");
    if(!nome) return;

    const programa = {
        nome: nome,
        data: new Date().toLocaleString(),
        pontos: pontos
    };

    // salva o programa
    localStorage.setItem(nome, JSON.stringify(programa));

    // 🔥 define como programa atual
    localStorage.setItem("programaAtual", nome);

    document.getElementById("statusPrograma").innerText =
        `Programa "${nome}" salvo com sucesso!`;

    console.log(programa);
}
/* =====================================
CARREGAR PROGRAMA SALVO
===================================== */

function carregarPrograma(){

    const nome =
    localStorage.getItem("programaAtual");

    if(!nome) return;

    const data =
    localStorage.getItem(nome);

    if(!data) return;

    const programa =
    JSON.parse(data);

    pontos = programa.pontos || [];

    atualizarLista();

    document.getElementById(
        "statusPrograma"
    ).innerText =
    `Programa "${programa.nome}" carregado`;
}

carregarPrograma();

animate();

/* =====================================
RESPONSIVO
===================================== */

window.addEventListener(
    "resize",
    () => {

        camera.aspect =
        window.innerWidth /
        window.innerHeight;

        camera.updateProjectionMatrix();

        renderer.setSize(
            window.innerWidth,
            window.innerHeight
        );
    }
);

</script>

</body>
</html>
