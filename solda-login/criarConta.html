<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Criar Conta</title>
  <link rel="stylesheet" href="./criarconta.css">


</head>
<body>

<div class="container">

  <h1>Criar Conta</h1>

  <input
    type="email"
    id="email"
    placeholder="Digite seu email"
  >

  <input
    type="password"
    id="senha"
    placeholder="Crie uma senha"
  >

  <button id="btnCadastrar">
    Criar Conta
  </button>

  <button id="btnVoltar">
    Voltar
  </button>

  <p id="mensagem"></p>

</div>

<script type="module" src="criarConta.js"></script>

</body>
</html>
